        <!-- 1. VISUALIZING CHANGE -->

        <section id='visualizing-change'>

          <section data-markdown>
            <textarea data-template>
              ## 1\. Visualizing change
              <p class="fragment">While working on variable font sources, the designer needs to know, at a glance, what is changing in a source in relation to the default.</p>
              <p class="fragment">“working on these fonts gives me a headache”</p>
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ### A\. Comparing attributes

              <ul>
                <li class="fragment">glyph-level attributes</li>
                  <ul class="fragment">
                    <li>width</li>
                    <li>margins</li>
                    <li>points</li>
                    <li>components</li>
                    <li>anchors</li>
                    <li>unicode</li>
                  </ul>
                <li class="fragment">point positions (deltas)</li>
                <li class="fragment">font-level attributes</li>
                  <ul class="fragment">
                    <li>font info</li>
                    <li>kerning</li>
                  </ul>
              </ul>

            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ### B\. Validation categories

              <table>
                <tr>
                  <td></td>
                  <td><em>equal to default</em></td>
                  <td><em>different from default</em></td>
                </tr>
                <tr>
                  <td><em>contours only</em></td>
                  <td>equal to default<br/>contours only</td>
                  <td>different from default<br/>contours only</td>

                <tr>

          <section data-markdown>

              ### Scripting examples

              <pre class='fragment'><code data-trim class="language-python">
              from xTools4.modules.measurements import FontMeasurements

              FM = FontMeasurements()
              FM.read(jsonPath)
              FM.measure(font)

              print(FM.definitions)
              >>> [('XOPQ', 'x', 'H', 2, 'H', 11, '', 'General x opaque'), ... ]

              print(FM.values)
              >>> {'XOPQ': 621, 'XOUC': 621, 'XOLC': 170, 'XOFI': 176, ... }
              </code></pre>

              <pre class='fragment'><code data-trim class="language-python">
              from xTools4.modules.measurements import GlyphMeasurements

              GM = GlyphMeasurements(font, glyphName)
              GM.read(jsonPath)
              GM.measure(font[glyphName])

              print(GM.definitions)
              >>> [('XOLC', 'x', 'd', 0, 'd', 25), ('XOLC', 'x', 'd', 31, 'd', 14), ... ]

              print(GM.values)
              >>> [184, 166, 126, 103, 590, ... ]
              </code></pre>

            </textarea>

        <section id='parametric-blending'>

          <section data-markdown>
            <textarea data-template>
              ## 3\. Parametric blending

              <p class='fragment'>
                combining parametric axes to create a blended designspace<br/>
                with optical size, weight, and width axes

          <section data-markdown>
            <textarea data-template>
              ### Parametric matching
              <ul>
                <li class='fragment'>create a separate measurements file for Amstelvar*</li>
                <li class='fragment'>extract parametric measurements from Amstelvar</li>
                <li class='fragment'>define AmstelvarA2 blended locations (mappings)<br/>from measurements of Amstelvar styles</li>
              </ul>
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              blends.json
              ```language-json"
              "opsz144_wdth50": {
                "XOUC": 78,
                "XOLC": 71,
                "XOFI": 72,
                "XTUC": 168,
                "XTUR": 214,
                ...
              }
              ```

              designspace
              ```xml
              <mapping description="opsz144_wdth50">
                <input>
                  <dimension name="Optical size" xvalue="144"/>
                  <dimension name="Width" xvalue="50"/>
                </input>
                <output>
                  <dimension name="XOUC" xvalue="78"/>
                  <dimension name="XOLC" xvalue="71"/>
                  <dimension name="XOFI" xvalue="72"/>
                  <dimension name="XTUC" xvalue="168"/>
                  <dimension name="XTUR" xvalue="214"/>
                  ...
                ```
            </textarea>
          </section>

        <!-- 4. GLYPH-CENTRIC EDITING -->

        <section id='glyph-centric-editing'>

          <section data-markdown>
            <textarea data-template>
              ## 4\. Glyph-centric editing

              <div class='fragment'>
                <p>UFO, RoboFont, designspace are font-centric.</p>
                <p>This is a problem in variable font production workflows, where we often need to edit multiple sources of a single glyph.</p>
              </div>
              <p class='fragment'>Opening complete fonts is expensive in terms of application performance (more time to load complete fonts) and cognitive performance (more effort to find and focus on a glyph).</p>
            </textarea>
          </section>

            <textarea data-template>
              ### TempEdit

              <a href='http://www.hipertipo.com/en/log/2021-05-07-elementar-tools/#tempedit'>since 2011</a>

              <ul>
                <li class='fragment'>import a single glyph from multiple UFOs into a temporary font</li>
                <li class='fragment'>edit the glyphs as usual</li>
                <li class='fragment'>save the glyphs back to the UFOs from which they came</li>
              </ul>

              <div class='fragment'>
                <br/>
                <p>demo:
                  <ul>
                    <li><a href='http://gferreira.github.io/xTools4/reference/tools/variable/temp-edit/'>TempEdit</a></li>

        <!-- 6. TUNING BLENDS -->

        <section id='tuning-blends'>

          <section data-markdown>
            <textarea data-template>
              ## 6\. Tuning blends

              <p class='fragment'>lessons from experience with the parametric method:
                <ul>
                  <li class='fragment'>don’t try to tune by making parametric sources impure</li>
                  <li class='fragment'>parametric axes alone are not enough to blend all corners</li>
                </ul>
              </p>
              <br/>
              <p class='fragment'>formulation of a simple and comprehensive model:
                <ul>
                  <li class='fragment'>pure parametric sources</li>
                  <li class='fragment'>tuning sources for blended styles (corners)</li>
                </ul>
              </p>

            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              <p>introduction of a tuning mechanism:
                <ul>
                  <li class='fragment'>a new set of sources with deltas for blended locations</li>
                  <li class='fragment'>a new set of hidden axes for tuning blended locations</li>
                  <li class='fragment'>a separate tool to temp-edit the tuning sources of a glyph</li>
                  <li class='fragment'>[new] automatic calculation of tuning glyphs</li>
                </ul>
              </p>

              <p class='fragment'>Blending with parametric sources and tuning sources<br/>allows us to match the reference font with precision.</p>

              <p class='fragment'>[new] Automatic tuning adds absolute precision and allows for parametric and tuning sources to develop simultaneously.</p>

            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ### Automatic tuning

              calculation of tuning sources (deltas) between<br/>blended instances and reference sources

              <p class='fragment'>three kinds of sources:</p>
              <ol>
                <li class='fragment'>parametric sources<br/>changes to one parameter and one parameter only</li>
                <li class='fragment'>reference sources<br/>hand-edited styles, not inserted in the designspace</li>
                <li class='fragment'>tuning sources<br/>deltas from parametric blends to reference styles</li>
              </ol>

            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              tuning composites:
              - tune base glyphs
              - tune component positions and glyph width

              <div class='fragment'>
                <br/>
                <p>demo:</p>
                <ul>
                  <li>Amstelvar A2 tuning axes</li>
                  <li><a href='http://gferreira.github.io/xTools4/reference/tools/variable/glyph-tuning/'>GlyphTuning</a></li>
                  <li>automatic tuning (proofs)</li>
                </ul>
              </div>

            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              in new parametric fonts (not based on existing type):  
              reference sources can be created by instantiating blended styles

              <div class='fragment'>
                <p>what automated tuning means, in practice:</p>
                <ul>
                  <li>use parametric axes to handle 90% of the work</li>
                  <li>fine-tune blended corners manually (reference sources)</li>
                  <li>encode the deltas on top of the parametric blends</li>
                </ul>
              </div>

              <p class='fragment'>a bridge between parametric and non-parametric typeface design</p>

              <div class='fragment'>
                <br/>
                <p>demo:</p>
                <ul>
                  <li><a href="http://gferreira.github.io/xTools4/reference/tools/variable/blends-instancer/">BlendsInstancer</a></li>
                </ul>
              </div>

            </textarea>
          </section>

        </section>

              ## 8\. Project controller

              [Python object](http://github.com/gferreira/xTools4/blob/main/Lib/xTools4/modules/xproject.py) for scripting parametric designspaces

              <ul>
                <li class='fragment'>measure and automatically name UFO sources</li>
                <li class='fragment'>automatically build designspace from source files</li>
                <li class='fragment'>blend typographic styles from parametric axes</li>
                <li class='fragment'>clean up and normalize UFO sources</li>
                <li class='fragment'>copy data from the default to all other sources</li>
                <li class='fragment'>navigate and filter the glyph set</li>
                <li class='fragment'>build and validate composite glyphs</li>
                <li class='fragment'>generate different kinds of PDF proofs</li>
                <li class='fragment'>build variable fonts and instances</li>
                <li class='fragment'>...and more!</li>
              </ul>
